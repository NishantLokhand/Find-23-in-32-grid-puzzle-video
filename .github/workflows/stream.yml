name: YouTube Live Stream

on:
  workflow_dispatch:   # manual run button
  schedule:
    - cron: "0 */5 * * *"   # runs every 5 hours

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your repo files
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step B: Install FFmpeg (streaming engine)
      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      # Step C: Start streaming to YouTube
      - name: Start YouTube Stream
        run: |
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 \
          -c:a aac -b:a 128k \
          -f flv rtmp://a.rtmp.youtube.com/live2/${{ secrets.STREAM_KEY }}
